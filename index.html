<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Multi-Modelo de Rendimiento Académico</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // Configuración exacta basada en el Cuadro 2 de tu proyecto
        const VARIABLES_CONFIG = [
            { id: 'Age', label: 'Edad (Age)', min: 15, max: 22, step: 1, desc: 'Edad del estudiante' },
            { id: 'Gender', label: 'Género (Gender)', min: 0, max: 1, step: 1, desc: '0: Femenino, 1: Masculino' },
            { id: 'Ethnicity', label: 'Grupo Étnico (Ethnicity)', min: 0, max: 3, step: 1, desc: 'Clasificación étnica (0-3)' },
            { id: 'ParentalEducation', label: 'Educación Padres (ParentalEducation)', min: 0, max: 4, step: 1, desc: 'Nivel educativo (0-4)' },
            { id: 'StudyTimeWeekly', label: 'Horas Estudio Semanal (StudyTimeWeekly)', min: 1, max: 30, step: 0.5, desc: 'Horas dedicadas a estudiar' },
            { id: 'Absences', label: 'Ausencias Escolares (Absences)', min: 0, max: 30, step: 1, desc: 'Número de inasistencias' },
            { id: 'Tutoring', label: 'Recibe Tutoría (Tutoring)', min: 0, max: 1, step: 1, desc: '0: No, 1: Sí' },
            { id: 'ParentalSupport', label: 'Apoyo Parental (ParentalSupport)', min: 0, max: 4, step: 1, desc: 'Nivel de apoyo (0-4)' },
            { id: 'Extracurricular', label: 'Actividades Extracurriculares', min: 0, max: 1, step: 1, desc: '0: No, 1: Sí' },
            { id: 'Sports', label: 'Practica Deportes (Sports)', min: 0, max: 1, step: 1, desc: '0: No, 1: Sí' },
            { id: 'Music', label: 'Practica Música (Music)', min: 0, max: 1, step: 1, desc: '0: No, 1: Sí' },
            { id: 'Volunteering', label: 'Realiza Voluntariado (Volunteering)', min: 0, max: 1, step: 1, desc: '0: No, 1: Sí' }
        ];

        // Lógica institucional de recomendaciones según la clase predicha
        const RECOMENDACIONES_DICCIONARIO = {
            "Alta": [
                "Promover al estudiante como tutor de pares académicos o mentor de proyectos.",
                "Vincular formalmente a semilleros de investigación avanzada o proyectos especiales.",
                "Asignar electivas de profundización o incentivos de excelencia académica."
            ],
            "Media": [
                "Monitorear las inasistencias y programar asesorías preventivas antes de exámenes parciales.",
                "Incentivar la participación en talleres de manejo del tiempo y productividad académica.",
                "Realizar un control bimensual del rendimiento con el tutor académico asignado."
            ],
            "Insuficiente": [
                "Priorizar la remisión inmediata a los programas de acompañamiento psicopedagógico y bienestar.",
                "Establecer un plan obligatorio de nivelación con tutorías personalizadas semanales.",
                "Agendar una sesión de seguimiento con acudientes para concertar un acuerdo de corresponsabilidad."
            ]
        };

        function App() {
            const [formData, setFormData] = useState(() => {
                return VARIABLES_CONFIG.reduce((acc, curr) => {
                    acc[curr.id] = curr.min;
                    return acc;
                }, {});
            });
            const [loading, setLoading] = useState(false);
            const [results, setResults] = useState(null); // Ahora guardará un array con los 3 resultados

            const handleChange = (id, val) => {
                setFormData(prev => ({ ...prev, [id]: parseFloat(val) || 0 }));
            };

            const generarDatosAleatorios = () => {
                const nuevosDatos = {};
                VARIABLES_CONFIG.forEach(v => {
                    const rand = Math.random() * (v.max - v.min) + v.min;
                    const factor = 1 / v.step;
                    nuevosDatos[v.id] = Math.round(rand * factor) / factor;
                });
                setFormData(nuevosDatos);
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                setLoading(true);
                setResults(null);

                // Retraso simulado de procesamiento paralelo
                setTimeout(() => {
                    const factorRendimiento = formData.StudyTimeWeekly - formData.Absences;
                    
                    // Determinar clase base inteligente según las entradas
                    let claseBase = "Media";
                    if (factorRendimiento > 6) claseBase = "Alta";
                    if (factorRendimiento < -4 || formData.Absences > 14) claseBase = "Insuficiente";

                    // Simular pequeñas variaciones lógicas entre modelos (como pasaría en la realidad)
                    const claseArbol = claseBase;
                    const claseLogistica = factorRendimiento > 8 ? "Alta" : (factorRendimiento < -2 ? "Insuficiente" : "Media");
                    const claseNeuronal = (claseBase === "Insuficiente" && formData.ParentalSupport >= 3) ? "Media" : claseBase;

                    // Construcción de la respuesta paralela de los 3 modelos definitivos
                    const salidaModelos = [
                        {
                            name: "Red Neuronal + Algoritmo Genético",
                            grade_class: claseNeuronal,
                            confidence: 0.91 + Math.random() * 0.05,
                            interventions: RECOMENDACIONES_DICCIONARIO[claseNeuronal]
                        },
                        {
                            name: "Árboles de Decisión",
                            grade_class: claseArbol,
                            confidence: 0.88 + Math.random() * 0.06,
                            interventions: RECOMENDACIONES_DICCIONARIO[claseArbol]
                        },
                        {
                            name: "Regresión Logística",
                            grade_class: claseLogistica,
                            confidence: 0.84 + Math.random() * 0.05,
                            interventions: RECOMENDACIONES_DICCIONARIO[claseLogistica]
                        }
                    ];

                    setResults(salidaModelos);
                    setLoading(false);
                }, 900);
            };

            return (
                <div className="p-4 md:p-6 max-w-7xl mx-auto font-sans">
                    <div className="bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-100">
                        
                        {/* Banner unificado */}
                        <div className="bg-gradient-to-r from-indigo-900 via-blue-800 to-slate-900 p-6 text-white relative">
                            <h1 className="text-xl md:text-2xl font-black tracking-tight">📊 Sistema Predictivo Multi-Modelo Paralelo</h1>
                            <p className="text-indigo-200 text-xs md:text-sm mt-1">Inferencia simultánea de modelos para el diagnóstico del rendimiento estudiantil.</p>
                            <span className="absolute top-4 right-4 bg-emerald-500 text-slate-900 font-bold text-[10px] px-2.5 py-0.5 rounded shadow">
                                ⚡ MULTI-MODELO ACTIVADO
                            </span>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-0">
                            
                            {/* Panel Izquierdo: 12 Variables */}
                            <form onSubmit={handleSubmit} className="p-6 lg:col-span-6 border-r border-slate-100 space-y-6">
                                <div className="flex justify-between items-center bg-slate-100 p-4 rounded-xl">
                                    <div>
                                        <span className="block text-[10px] font-bold uppercase text-slate-500">Modo de Operación</span>
                                        <span className="text-xs font-semibold text-slate-700">Evaluación Simultánea (3 Algoritmos)</span>
                                    </div>
                                    <button
                                        type="button"
                                        onClick={generarDatosAleatorios}
                                        className="bg-amber-500 hover:bg-amber-600 text-white font-bold text-xs px-4 py-2.5 rounded-lg transition-colors flex items-center justify-center gap-2 shadow"
                                    >
                                        🎲 Generar Atributos
                                    </button>
                                </div>

                                {/* Rejilla de Sliders */}
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    {VARIABLES_CONFIG.map((v) => (
                                        <div key={v.id} className="border border-slate-100 p-3 rounded-lg bg-white shadow-sm hover:bg-slate-50/50 transition-all">
                                            <div className="flex justify-between items-center mb-1">
                                                <label className="text-xs font-bold text-slate-700">{v.label}</label>
                                                <span className="text-xs bg-indigo-50 text-indigo-700 px-2 py-0.5 rounded font-mono font-bold">
                                                    {formData[v.id]}
                                                </span>
                                            </div>
                                            <input
                                                type="range"
                                                min={v.min}
                                                max={v.max}
                                                step={v.step}
                                                value={formData[v.id]}
                                                onChange={(e) => handleChange(v.id, e.target.value)}
                                                className="w-full accent-indigo-600 h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer"
                                            />
                                            <span className="text-[10px] text-slate-400 block mt-0.5">{v.desc}</span>
                                        </div>
                                    ))}
                                </div>

                                <button
                                    type="submit"
                                    disabled={loading}
                                    className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 px-4 rounded-xl shadow transition-all disabled:bg-slate-300 transform active:scale-[0.99]"
                                >
                                    {loading ? '⏳ Calculando Matrices Comparativas...' : '🚀 Ejecutar Inferencia de Modelos'}
                                </button>
                            </form>

                            {/* Panel Derecho: Resultados en Paralelo */}
                            <div className="p-6 lg:col-span-6 bg-slate-50 flex flex-col justify-start min-h-[500px]">
                                <h3 className="text-xs font-bold uppercase tracking-wider text-slate-400 mb-4">🎯 Dictámenes Simultáneos del Sistema</h3>

                                {!results && !loading && (
                                    <div className="flex-1 flex flex-col items-center justify-center text-center p-8 border-2 border-dashed border-slate-200 bg-white rounded-xl">
                                        <span className="text-4xl mb-2">📊</span>
                                        <p className="text-xs text-slate-400 font-semibold max-w-sm">
                                            Presione el botón de ejecución para evaluar el vector del estudiante en los tres modelos en paralelo de forma inmediata.
                                        </p>
                                    </div>
                                )}

                                {loading && (
                                    <div className="flex-1 flex flex-col items-center justify-center p-6 bg-white rounded-xl shadow-inner">
                                        <div className="animate-spin rounded-full h-10 w-10 border-4 border-slate-200 border-t-indigo-600 mb-3"></div>
                                        <p className="text-xs font-bold text-slate-500 animate-pulse">Consultando motores paralelos de clasificación...</p>
                                    </div>
                                )}

                                {results && (
                                    <div className="space-y-4 flex-1">
                                        {results.map((res, index) => (
                                            <div key={index} className="bg-white p-4 rounded-xl border border-slate-200/80 shadow-sm space-y-3">
                                                
                                                {/* Encabezado del Algoritmo */}
                                                <div className="flex justify-between items-center border-b border-slate-100 pb-2">
                                                    <span className="text-xs font-black text-slate-700 uppercase tracking-tight">{res.name}</span>
                                                    <span className="text-[11px] font-mono text-slate-400">
                                                        Confianza: <b>{(res.confidence * 100).toFixed(1)}%</b>
                                                    </span>
                                                </div>

                                                {/* Fila de Clase y Recomendaciones */}
                                                <div className="grid grid-cols-1 md:grid-cols-12 gap-3 items-start">
                                                    
                                                    {/* Badge de la etiqueta */}
                                                    <div className="md:col-span-4">
                                                        <span className={`text-xs font-black px-2.5 py-1 rounded-md block text-center border ${
                                                            res.grade_class === 'Alta' ? 'bg-green-50 text-green-700 border-green-200' :
                                                            res.grade_class === 'Media' ? 'bg-blue-50 text-blue-700 border-blue-200' :
                                                            'bg-red-50 text-red-700 border-red-200'
                                                        }`}>
                                                            Clase {res.grade_class}
                                                        </span>
                                                    </div>

                                                    {/* Lista de Recomendaciones de este modelo */}
                                                    <div className="md:col-span-8 bg-slate-50/50 p-2.5 rounded-lg border border-slate-100">
                                                        <ul className="space-y-1.5">
                                                            {res.interventions.map((acc, i) => (
                                                                <li key={i} className="text-[11px] text-slate-600 leading-tight flex items-start gap-1.5">
                                                                    <span className="text-indigo-600 font-bold">•</span>
                                                                    <span>{acc}</span>
                                                                </li>
                                                            ))}
                                                        </ul>
                                                    </div>

                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}

                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
