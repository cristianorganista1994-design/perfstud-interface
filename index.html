<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Multi-Modelo de Rendimiento Académico</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // Diccionarios de mapeo para renderizar los menús desplegables
        const OPCIONES_GENERO = [
            { value: 0, label: "Femenino" },
            { value: 1, label: "Masculino" }
        ];

        const OPCIONES_ETNIA = [
            { value: 0, label: "Blanco" },
            { value: 1, label: "Afroamericano" },
            { value: 2, label: "Indígena" },
            { value: 3, label: "Otra" }
        ];

        const OPCIONES_NIVEL = [
            { value: 0, label: "Nivel 0 (Ninguno / Muy Bajo)" },
            { value: 1, label: "Nivel 1 (Bajo)" },
            { value: 2, label: "Nivel 2 (Medio)" },
            { value: 3, label: "Nivel 3 (Alto)" },
            { value: 4, label: "Nivel 4 (Muy Alto / Superior)" }
        ];

        // Estructura de variables organizadas por tipo de control para el formulario
        const VARIABLES_CONFIG = [
            { id: 'Age', label: 'Edad (Age)', min: 15, max: 22, step: 1, desc: 'Edad del estudiante', type: 'slider' },
            { id: 'StudyTimeWeekly', label: 'Horas Estudio Semanal (StudyTimeWeekly)', min: 1, max: 30, step: 0.5, desc: 'Horas dedicadas a estudiar', type: 'slider' },
            { id: 'Absences', label: 'Ausencias Escolares (Absences)', min: 0, max: 30, step: 1, desc: 'Número de inasistencias', type: 'slider' },
            
            { id: 'Gender', label: 'Género (Gender)', desc: 'Identificación de género', type: 'select', options: OPCIONES_GENERO },
            { id: 'Ethnicity', label: 'Grupo Étnico (Ethnicity)', desc: 'Clasificación étnica', type: 'select', options: OPCIONES_ETNIA },
            { id: 'ParentalEducation', label: 'Educación Padres (ParentalEducation)', desc: 'Nivel educativo alcanzado', type: 'select', options: OPCIONES_NIVEL },
            { id: 'ParentalSupport', label: 'Apoyo Parental (ParentalSupport)', desc: 'Nivel de apoyo en el hogar', type: 'select', options: OPCIONES_NIVEL },
            
            { id: 'Tutoring', label: 'Recibe Tutoría (Tutoring)', desc: 'Apoyo académico extra', type: 'checkbox' },
            { id: 'Extracurricular', label: 'Actividades Extracurriculares', desc: 'Participa en talleres/clubes', type: 'checkbox' },
            { id: 'Sports', label: 'Practica Deportes (Sports)', desc: 'Actividad física regular', type: 'checkbox' },
            { id: 'Music', label: 'Practica Música (Music)', desc: 'Formación o práctica musical', type: 'checkbox' },
            { id: 'Volunteering', label: 'Realiza Voluntariado (Volunteering)', desc: 'Proyectos de ayuda social', type: 'checkbox' }
        ];

        // Mapeo Oficial Basado en la Tabla de Distribución de tu Proyecto
        const CONFIG_CATEGORIAS = {
            0: { label: "Clase 0: Excelente", estilos: "bg-emerald-100 text-emerald-800 border-emerald-200", interventions: [
                "Vincular formalmente al estudiante a semilleros de investigación avanzada o proyectos especiales de la facultad.",
                "Postular al estudiante como tutor de pares académicos para apoyar las asignaturas críticas.",
                "Otorgar mención de honor o incentivos de excelencia académica institucional."
            ]},
            1: { label: "Clase 1: Sobresaliente", estilos: "bg-green-100 text-green-800 border-green-200", interventions: [
                "Promover la participación del estudiante en monitorías académicas voluntarias.",
                "Incentivar la selección de asignaturas electivas de profundización o alta exigencia.",
                "Mantener el seguimiento regular para asegurar la continuidad del alto desempeño."
            ]},
            2: { label: "Clase 2: Aceptable", estilos: "bg-blue-100 text-blue-800 border-blue-200", interventions: [
                "Incentivar la participación activa en talleres organizados de manejo del tiempo y hábitos de estudio.",
                "Sugerir tutorías grupales voluntarias en temas específicos previos a las evaluaciones parciales.",
                "Realizar una revisión de medio término de las calificaciones con el consejero de carrera."
            ]},
            3: { label: "Clase 3: Bajo", estilos: "bg-orange-100 text-orange-800 border-orange-200", interventions: [
                "Agendar tutorías académicas obligatorias semanales en las asignaturas con mayor dificultad.",
                "Establecer un monitoreo quincenal estricto de las ausencias del estudiante en plataforma.",
                "Remitir a talleres de acompañamiento académico intermedio para fortalecer competencias clave."
            ]},
            4: { label: "Clase 4: Insuficiente", estilos: "bg-red-100 text-red-800 border-red-200", interventions: [
                "Priorizar la remisión inmediata a los programas institucionales de acompañamiento psicopedagógico y bienestar.",
                "Concertar una cita urgente con acudientes/padres de familia para ajustar un compromiso de corresponsabilidad.",
                "Diseñar un plan de nivelación obligatorio y suspender la carga extracurricular si afecta el desempeño."
            ]}
        };

        function App() {
            const [formData, setFormData] = useState(() => {
                return VARIABLES_CONFIG.reduce((acc, curr) => {
                    // Inicializar checkboxes en 0 y el resto en sus mínimos o primeras opciones
                    if (curr.type === 'checkbox') {
                        acc[curr.id] = 0;
                    } else if (curr.type === 'slider') {
                        acc[curr.id] = curr.min;
                    } else {
                        acc[curr.id] = curr.options[0].value;
                    }
                    return acc;
                }, {});
            });
            const [loading, setLoading] = useState(false);
            const [results, setResults] = useState(null);

            const handleChange = (id, val) => {
                setFormData(prev => ({ ...prev, [id]: parseFloat(val) }));
            };

            const handleCheckboxChange = (id, checked) => {
                setFormData(prev => ({ ...prev, [id]: checked ? 1 : 0 }));
            };

            const generarDatosAleatorios = () => {
                const nuevosDatos = {};
                VARIABLES_CONFIG.forEach(v => {
                    if (v.type === 'checkbox') {
                        nuevosDatos[v.id] = Math.random() > 0.5 ? 1 : 0;
                    } else if (v.type === 'slider') {
                        const rand = Math.random() * (v.max - v.min) + v.min;
                        const factor = 1 / v.step;
                        nuevosDatos[v.id] = Math.round(rand * factor) / factor;
                    } else {
                        const opcionAlAzar = v.options[Math.floor(Math.random() * v.options.length)];
                        nuevosDatos[v.id] = opcionAlAzar.value;
                    }
                });
                setFormData(nuevosDatos);
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                setLoading(true);
                setResults(null);

                setTimeout(() => {
                    // Lógica predictiva simulada
                    const factorRendimiento = formData.StudyTimeWeekly - formData.Absences;
                    let claseBase = 2; //
                    
                    if (factorRendimiento > 15) {
                        claseBase = 0; 
                    } else if (factorRendimiento > 4) {
                        claseBase = 1; 
                    } else if (factorRendimiento >= -3) {
                        claseBase = 2; 
                    } else if (factorRendimiento >= -10) {
                        claseBase = 3; 
                    } else {
                        claseBase = 4; 
                    }

                    if (formData.Absences > 16) claseBase = 4;

                    let claseNeuronal = claseBase;
                    let claseArbol = (claseBase === 1 && formData.Tutoring === 0) ? 2 : claseBase;
                    let claseLogistica = (factorRendimiento < -12) ? 4 : (factorRendimiento < -6 ? 3 : (factorRendimiento > 10 ? 0 : claseBase));

                    claseNeuronal = Math.max(0, Math.min(4, claseNeuronal));
                    claseArbol = Math.max(0, Math.min(4, claseArbol));
                    claseLogistica = Math.max(0, Math.min(4, claseLogistica));

                    const claseEnsamble = Math.round((claseNeuronal + claseArbol + claseLogistica) / 3);

                    const confNeuronal = 0.92 + Math.random() * 0.04;
                    const confArbol = 0.87 + Math.random() * 0.05;
                    const confLogistica = 0.83 + Math.random() * 0.04;
                    const confEnsamble = (confNeuronal + confArbol + confLogistica) / 3;

                    const salidaModelos = [
                        { name: "Red Neuronal + Algoritmo Genético", claseId: claseNeuronal, confidence: confNeuronal, isEnsemble: false },
                        { name: "Árboles de Decisión", claseId: claseArbol, confidence: confArbol, isEnsemble: false },
                        { name: "Regresión Logística", claseId: claseLogistica, confidence: confLogistica, isEnsemble: false },
                        { name: "Ensamble Predictivo (Promedio de Modelos)", claseId: claseEnsamble, confidence: confEnsamble, isEnsemble: true }
                    ];

                    setResults(salidaModelos);
                    setLoading(false);
                }, 900);
            };

            return (
                <div className="p-4 md:p-6 max-w-7xl mx-auto font-sans">
                    <div className="bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-100">
                        
                        {/* Banner Principal */}
                        <div className="bg-gradient-to-r from-slate-900 via-indigo-950 to-slate-900 p-6 text-white relative">
                            <h1 className="text-xl md:text-2xl font-black tracking-tight">📊 Sistema Predictivo Multi-Modelo Paralelo</h1>
                            <p className="text-slate-300 text-xs md:text-sm mt-1">Inferencia simultánea de modelos entrenados y métricas consolidadas por ensamble ordinal.</p>
                            <span className="absolute top-4 right-4 bg-amber-500 text-slate-900 font-bold text-[10px] px-2.5 py-0.5 rounded shadow">
                                🛠️ MODO SIMULACIÓN OFFLINE (5 CLASES)
                            </span>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-0">
                            
                            {/* Panel Izquierdo: Formulario Optimizado */}
                            <form onSubmit={handleSubmit} className="p-6 lg:col-span-6 border-r border-slate-100 space-y-6">
                                <div className="flex justify-between items-center bg-slate-100 p-4 rounded-xl">
                                    <div>
                                        <span className="block text-[10px] font-bold uppercase text-slate-500">Formulario Ergonómico</span>
                                        <span className="text-xs font-semibold text-slate-700">Mapeo optimizado de controles (0 a 4)</span>
                                    </div>
                                    <button
                                        type="button"
                                        onClick={generarDatosAleatorios}
                                        className="bg-amber-500 hover:bg-amber-600 text-white font-bold text-xs px-4 py-2.5 rounded-lg transition-colors flex items-center justify-center gap-2 shadow"
                                    >
                                        🎲 Cargar Estudiante Aleatorio
                                    </button>
                                </div>

                                <div className="space-y-4">
                                    {/* SECCIÓN 1: Sliders de Variables Continuas/Numéricas */}
                                    <div className="bg-slate-50 p-3 rounded-xl border border-slate-100 grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        <div className="sm:col-span-2 text-[11px] font-bold text-indigo-950 uppercase border-b border-slate-200 pb-1">Variables Numéricas / Rangos</div>
                                        {VARIABLES_CONFIG.filter(v => v.type === 'slider').map((v) => (
                                            <div key={v.id} className="bg-white p-3 rounded-lg border border-slate-200 shadow-sm">
                                                <div className="flex justify-between items-center mb-1">
                                                    <label className="text-xs font-bold text-slate-700">{v.label}</label>
                                                    <span className="text-xs bg-indigo-50 text-indigo-700 px-2 py-0.5 rounded font-sans font-bold">
                                                        {formData[v.id]}
                                                    </span>
                                                </div>
                                                <input
                                                    type="range"
                                                    min={v.min}
                                                    max={v.max}
                                                    step={v.step}
                                                    value={formData[v.id]}
                                                    onChange={(e) => handleChange(v.id, e.target.value)}
                                                    className="w-full accent-indigo-600 h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer"
                                                />
                                            </div>
                                        ))}
                                    </div>

                                    {/* SECCIÓN 2: Menús Desplegables (Selects) */}
                                    <div className="bg-slate-50 p-3 rounded-xl border border-slate-100 grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        <div className="sm:col-span-2 text-[11px] font-bold text-indigo-950 uppercase border-b border-slate-200 pb-1">Categorías Generales</div>
                                        {VARIABLES_CONFIG.filter(v => v.type === 'select').map((v) => (
                                            <div key={v.id} className="bg-white p-3 rounded-lg border border-slate-200 shadow-sm flex flex-col justify-between">
                                                <label className="text-xs font-bold text-slate-700 mb-1.5">{v.label}</label>
                                                <select
                                                    value={formData[v.id]}
                                                    onChange={(e) => handleChange(v.id, e.target.value)}
                                                    className="w-full bg-slate-50 border border-slate-200 text-xs font-semibold rounded-lg px-2.5 py-2 text-slate-700 focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:outline-none"
                                                >
                                                    {v.options.map(opt => (
                                                        <option key={opt.value} value={opt.value}>{opt.label}</option>
                                                    ))}
                                                </select>
                                            </div>
                                        ))}
                                    </div>

                                    {/* SECCIÓN 3: Checkboxes (Casillas de Verificación) */}
                                    <div className="bg-slate-50 p-3 rounded-xl border border-slate-100">
                                        <div className="text-[11px] font-bold text-indigo-950 uppercase border-b border-slate-200 pb-1 mb-3">Atributos Dicotómicos / Binarios</div>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                            {VARIABLES_CONFIG.filter(v => v.type === 'checkbox').map((v) => (
                                                <label key={v.id} className="bg-white border border-slate-200 rounded-lg p-3 shadow-sm flex items-center gap-3 cursor-pointer select-none hover:bg-slate-50/50 transition-colors">
                                                    <input
                                                        type="checkbox"
                                                        checked={formData[v.id] === 1}
                                                        onChange={(e) => handleCheckboxChange(v.id, e.target.checked)}
                                                        className="w-4 h-4 rounded text-indigo-600 bg-slate-100 border-slate-300 focus:ring-indigo-500 focus:ring-2 accent-indigo-600"
                                                    />
                                                    <div className="flex flex-col">
                                                        <span className="text-xs font-bold text-slate-700">{v.label}</span>
                                                        <span className="text-[10px] text-slate-400">{v.desc}</span>
                                                    </div>
                                                </label>
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                <button
                                    type="submit"
                                    disabled={loading}
                                    className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 px-4 rounded-xl shadow transition-all disabled:bg-slate-300 transform active:scale-[0.99]"
                                >
                                    {loading ? '⏳ Calculando Matrices en Paralelo...' : '🚀 Ejecutar Diagnóstico de Rendimiento'}
                                </button>
                            </form>

                            {/* Panel Derecho: Resultados */}
                            <div className="p-6 lg:col-span-6 bg-slate-50 flex flex-col justify-start min-h-[500px]">
                                <h3 className="text-xs font-bold uppercase tracking-wider text-slate-400 mb-4">🎯 Dictámenes Simultáneos del Sistema</h3>

                                {!results && !loading && (
                                    <div className="flex-1 flex flex-col items-center justify-center text-center p-8 border-2 border-dashed border-slate-200 bg-white rounded-xl">
                                        <span className="text-4xl mb-2">📊</span>
                                        <p className="text-xs text-slate-400 font-semibold max-w-sm">
                                            Interactúe con el nuevo formulario estructurado para evaluar los 4 bloques de inferencia.
                                        </p>
                                    </div>
                                )}

                                {loading && (
                                    <div className="flex-1 flex flex-col items-center justify-center p-6 bg-white rounded-xl shadow-inner">
                                        <div className="animate-spin rounded-full h-10 w-10 border-4 border-slate-200 border-t-indigo-600 mb-3"></div>
                                        <p className="text-xs font-bold text-slate-500 animate-pulse">Consultando motores paralelos y ensambles de votación...</p>
                                    </div>
                                )}

                                {results && (
                                    <div className="space-y-4 flex-1">
                                        {results.map((res, index) => {
                                            const configCategoria = CONFIG_CATEGORIAS[res.claseId];
                                            return (
                                                <div 
                                                    key={index} 
                                                    className={`p-4 rounded-xl border shadow-sm space-y-3 transition-all ${
                                                        res.isEnsemble 
                                                        ? 'bg-gradient-to-r from-amber-50 to-orange-50 border-amber-300 ring-2 ring-amber-400/20' 
                                                        : 'bg-white border-slate-200/80'
                                                    }`}
                                                >
                                                    <div className="flex justify-between items-center border-b border-slate-100 pb-2">
                                                        <div className="flex items-center gap-1.5">
                                                            {res.isEnsemble && <span className="text-base">👑</span>}
                                                            <span className={`text-xs font-black tracking-tight ${res.isEnsemble ? 'text-amber-900 text-sm' : 'text-slate-700 uppercase'}`}>
                                                                {res.name}
                                                            </span>
                                                        </div>
                                                        <span className={`text-[11px] font-mono ${res.isEnsemble ? 'text-amber-700 font-bold' : 'text-slate-400'}`}>
                                                            Confianza {res.isEnsemble ? 'Promedio' : ''}: <b>{(res.confidence * 100).toFixed(1)}%</b>
                                                        </span>
                                                    </div>

                                                    <div className="grid grid-cols-1 md:grid-cols-12 gap-3 items-start">
                                                        <div className="md:col-span-4">
                                                            <span className={`text-xs font-black px-2 py-1.5 rounded-md block text-center border shadow-sm ${configCategoria.estilos}`}>
                                                                {configCategoria.label}
                                                            </span>
                                                        </div>

                                                        <div className={`md:col-span-8 p-2.5 rounded-lg border ${res.isEnsemble ? 'bg-white/80 border-amber-200' : 'bg-slate-50/50 border-slate-100'}`}>
                                                            <ul className="space-y-1.5">
                                                                {configCategoria.interventions.map((acc, i) => (
                                                                    <li key={i} className="text-[11px] text-slate-600 leading-tight flex items-start gap-1.5">
                                                                        <span className={`${res.isEnsemble ? 'text-amber-600' : 'text-indigo-600'} font-bold`}>•</span>
                                                                        <span>{acc}</span>
                                                                    </li>
                                                                ))}
                                                            </ul>
                                                        </div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                )}

                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
