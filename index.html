<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Clasificación Académica</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

    <div id="root"></div>

    <script type="text/transform-babel">
        const { useState } = React;

        const API_URL = "https://landlord-enjoyment-aflutter.ngrok-free.dev/predict";

        // Configuración estricta basada en el Cuadro 2 de tu proyecto
        const VARIABLES_CONFIG = [
            { id: 'Age', label: 'Edad (Age)', min: 15, max: 22, step: 1, desc: 'Edad del estudiante' },
            { id: 'Gender', label: 'Género (Gender)', min: 0, max: 1, step: 1, desc: '0: Femenino, 1: Masculino' },
            { id: 'Ethnicity', label: 'Grupo Étnico (Ethnicity)', min: 0, max: 3, step: 1, desc: 'Clasificación étnica (0-3)' },
            { id: 'ParentalEducation', label: 'Educación Padres (ParentalEducation)', min: 0, max: 4, step: 1, desc: 'Nivel educativo (0-4)' },
            { id: 'StudyTimeWeekly', label: 'Horas Estudio Semanal (StudyTimeWeekly)', min: 1, max: 30, step: 0.5, desc: 'Horas dedicadas a estudiar' },
            { id: 'Absences', label: 'Ausencias Escolares (Absences)', min: 0, max: 30, step: 1, desc: 'Número de inasistencias' },
            { id: 'Tutoring', label: 'Recibe Tutoría (Tutoring)', min: 0, max: 1, step: 1, desc: '0: No, 1: Sí' },
            { id: 'ParentalSupport', label: 'Apoyo Parental (ParentalSupport)', min: 0, max: 4, step: 1, desc: 'Nivel de apoyo (0-4)' },
            { id: 'Extracurricular', label: 'Actividades Extracurriculares', min: 0, max: 1, step: 1, desc: '0: No, 1: Sí' },
            { id: 'Sports', label: 'Practica Deportes (Sports)', min: 0, max: 1, step: 1, desc: '0: No, 1: Sí' },
            { id: 'Music', label: 'Practica Música (Music)', min: 0, max: 1, step: 1, desc: '0: No, 1: Sí' },
            { id: 'Volunteering', label: 'Realiza Voluntariado (Volunteering)', min: 0, max: 1, step: 1, desc: '0: No, 1: Sí' }
        ];

        function App() {
            const [formData, setFormData] = useState(
                VARIABLES_CONFIG.reduce((acc, curr) => ({ ...acc, [curr.id]: curr.min }), {})
            );
            const [model, setModel] = useState('random_forest');
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);

            const handleChange = (id, val) => {
                setFormData(prev => ({ ...prev, [id]: parseFloat(val) || 0 }));
            };

            // REQUERIMIENTO: Botón para generar datos aleatorios lógicos
            const generarDatosAleatorios = () => {
                const nuevosDatos = {};
                VARIABLES_CONFIG.forEach(v => {
                    const rand = Math.random() * (v.max - v.min) + v.min;
                    const factor = 1 / v.step;
                    nuevosDatos[v.id] = Math.round(rand * factor) / factor;
                });
                setFormData(nuevosDatos);
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);
                setResult(null);

                const featuresArray = VARIABLES_CONFIG.map(v => formData[v.id]);

                try {
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'ngrok-skip-browser-warning': 'true' // Salto de advertencia ngrok
                        },
                        body: JSON.stringify({ model, features: featuresArray })
                    });

                    if (!response.ok) throw new Error('Error en el servidor AWS');
                    const data = await response.json();
                    setResult(data);
                } catch (err) {
                    alert('❌ Error al conectar con el backend en AWS. Revisa que Flask y ngrok sigan activos.');
                    console.error(err);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="p-4 md:p-8 font-sans max-w-6xl mx-auto">
                    <div className="bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-100">
                        
                        {/* Banner Principal */}
                        <div className="bg-gradient-to-r from-blue-700 to-indigo-800 p-6 text-white">
                            <h1 className="text-xl md:text-2xl font-bold">📊 Panel de Clasificación de Rendimiento Académico</h1>
                            <p className="text-blue-100 text-xs md:text-sm mt-1">Simulador predictivo responsive basado en 12 variables de entrada.</p>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-0">
                            
                            {/* Panel Izquierdo: Controles */}
                            <form onSubmit={handleSubmit} className="p-6 lg:col-span-7 border-r border-slate-100 space-y-6">
                                <div className="flex flex-col sm:flex-row justify-between items-stretch sm:items-center gap-4 bg-slate-100 p-4 rounded-xl">
                                    <div className="flex-1">
                                        <label className="block text-[10px] font-bold uppercase text-slate-500 mb-1">Algoritmo Inteligente</label>
                                        <select 
                                            value={model} 
                                            onChange={(e) => setModel(e.target.value)}
                                            className="w-full bg-white border border-slate-200 rounded-lg px-3 py-1.5 text-sm focus:ring-2 focus:ring-blue-500"
                                        >
                                            <option value="random_forest">Random Forest Classifier</option>
                                            <option value="genetic">Algoritmo Genético (eLCS)</option>
                                            <option value="mlp">Red Neuronal Artificial (MLP)</option>
                                        </select>
                                    </div>
                                    <button
                                        type="button"
                                        onClick={generarDatosAleatorios}
                                        className="bg-amber-500 hover:bg-amber-600 text-white font-bold text-sm px-4 py-2 rounded-lg transition-colors flex items-center justify-center gap-2 shadow"
                                    >
                                        🎲 Datos Aleatorios
                                    </button>
                                </div>

                                {/* Inputs en Cuadrícula Dinámica */}
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    {VARIABLES_CONFIG.map((v) => (
                                        <div key={v.id} className="border border-slate-100 p-3 rounded-lg bg-white shadow-sm hover:bg-slate-50/50 transition-colors">
                                            <div className="flex justify-between items-center mb-1">
                                                <label className="text-xs font-bold text-slate-700">{v.label}</label>
                                                <span className="text-xs bg-blue-100 text-blue-800 px-2 py-0.5 rounded font-mono font-bold">
                                                    {formData[v.id]}
                                                </span>
                                            </div>
                                            <input
                                                type="range"
                                                min={v.min}
                                                max={v.max}
                                                step={v.step}
                                                value={formData[v.id]}
                                                onChange={(e) => handleChange(v.id, e.target.value)}
                                                className="w-full accent-blue-600 h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer"
                                            />
                                            <span className="text-[10px] text-slate-400 block mt-0.5">{v.desc}</span>
                                        </div>
                                    ))}
                                </div>

                                <button
                                    type="submit"
                                    disabled={loading}
                                    className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl shadow transition-all disabled:bg-slate-300"
                                >
                                    {loading ? '⏳ Procesando Operaciones en AWS...' : '🚀 Ejecutar Diagnóstico de Rendimiento'}
                                </button>
                            </form>

                            {/* Panel Derecho: Respuestas Dinámicas */}
                            <div className="p-6 lg:col-span-5 bg-slate-50 flex flex-col justify-start">
                                <h3 className="text-sm font-bold uppercase tracking-wider text-slate-500 mb-4">🎯 Diagnóstico de Salida</h3>

                                {!result && !loading && (
                                    <div className="flex-1 flex flex-col items-center justify-center text-center p-6 border-2 border-dashed border-slate-200 bg-white rounded-xl">
                                        <span className="text-3xl mb-2">📊</span>
                                        <p className="text-xs text-slate-400 font-medium">Llene los datos manuales o genere valores aleatorios para evaluar la categoría (Alta, Media o Insuficiente).</p>
                                    </div>
                                )}

                                {loading && (
                                    <div className="flex-1 flex flex-col items-center justify-center p-6 bg-white rounded-xl shadow-sm">
                                        <div className="animate-spin rounded-full h-8 w-8 border-3 border-slate-200 border-t-blue-600 mb-2"></div>
                                        <p className="text-xs font-medium text-slate-400">Analizando tensores académicos...</p>
                                    </div>
                                )}

                                {result && (
                                    <div className="space-y-4 flex-1">
                                        <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                                            <span className="text-[10px] font-bold text-slate-400 block uppercase">Clasificación Académica</span>
                                            <span className={`text-xl font-black px-3 py-1 rounded-lg inline-block mt-1.5 ${
                                                result.grade_class === 'Alta' ? 'bg-green-100 text-green-800 border border-green-200' :
                                                result.grade_class === 'Media' ? 'bg-blue-100 text-blue-800 border border-blue-200' :
                                                'bg-red-100 text-red-800 border border-red-200'
                                            }`}>
                                                Clase {result.grade_class}
                                            </span>
                                            <div className="mt-2 pt-2 border-t border-slate-100 flex justify-between text-xs text-slate-400">
                                                <span>Confianza: <b>{(result.confidence * 100).toFixed(1)}%</b></span>
                                                <span>Modelo: <b className="font-mono">{result.model_used}</b></span>
                                            </div>
                                        </div>

                                        {/* Recomendaciones Requeridas */}
                                        <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex-1">
                                            <h4 className="text-[10px] font-bold text-slate-400 uppercase mb-2">💡 Acciones Institucionales Recomendadas:</h4>
                                            <ul className="space-y-2.5">
                                                {result.interventions.map((accion, idx) => (
                                                    <li key={idx} className="text-xs text-slate-600 leading-relaxed flex items-start gap-2">
                                                        <span className="text-blue-600 font-bold">•</span>
                                                        <span>{accion}</span>
                                                    </li>
                                                ))}
                                            </ul>
                                        </div>
                                    </div>
                                )}

                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
